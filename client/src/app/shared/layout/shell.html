<div class="min-h-screen bg-slate-50">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a routerLink="/" class="text-xl font-bold text-slate-900">SmåJobb</a>
        <nav class="flex items-center gap-1 text-sm">
          <a
            routerLink="/jobs"
            routerLinkActive="bg-slate-100 text-slate-900"
            [routerLinkActiveOptions]="{ exact: true }"
            class="px-3 py-1.5 rounded-md text-slate-600 hover:bg-slate-100"
          >
            Jobber
          </a>
          <a
            routerLink="/jobs/mine"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="px-3 py-1.5 rounded-md text-slate-600 hover:bg-slate-100"
          >
            Mine jobber
          </a>
          <a
            routerLink="/jobs/new"
            routerLinkActive="bg-slate-100 text-slate-900"
            class="px-3 py-1.5 rounded-md text-slate-600 hover:bg-slate-100"
          >
            Legg ut jobb
          </a>
        </nav>
      </div>
      <div class="flex items-center gap-3 text-sm">
        @if (auth.currentUser(); as user) {
          <span class="text-slate-600 hidden sm:inline">
            {{ user.fullName }}
          </span>
        }
        <button
          type="button"
          (click)="logout()"
          class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100"
        >
          Logg ut
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <router-outlet />
  </main>
</div>
