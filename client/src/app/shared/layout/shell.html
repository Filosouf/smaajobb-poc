<div class="min-h-screen bg-night-base">
  <header class="header">
    <div class="header-inner">
      <a routerLink="/" class="logo-link">
        <ui-logo [size]="24" />
      </a>

      <nav class="nav">
        <a
          routerLink="/jobs"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
        >
          <ui-icon name="home" [size]="18" />
          <span>Utforsk</span>
        </a>
        <a
          routerLink="/jobs/mine"
          routerLinkActive="active"
          class="nav-link"
        >
          <ui-icon name="briefcase" [size]="18" />
          <span>Mine jobber</span>
        </a>
        <a
          routerLink="/applications/mine"
          routerLinkActive="active"
          class="nav-link"
        >
          <ui-icon name="message" [size]="18" />
          <span>Mine søknader</span>
        </a>
      </nav>

      <div class="actions">
        <a routerLink="/jobs/new" class="post-cta">
          <ui-button variant="primary" size="md">
            <ui-icon name="plus" [size]="18" />
            Legg ut jobb
          </ui-button>
        </a>
        @if (auth.currentUser(); as user) {
          <button type="button" class="profile" (click)="logout()" [title]="user.fullName + ' · klikk for å logge ut'">
            <ui-avatar [name]="user.fullName" [size]="36" tone="gold" />
          </button>
        }
      </div>
    </div>
  </header>

  <main class="main">
    <router-outlet />
  </main>
</div>
