<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-slate-900">SmåJobb</h1>
      <p class="mt-2 text-sm text-slate-600">Sett nytt passord</p>
    </div>

    @if (missingParams()) {
      <div class="bg-white shadow-sm rounded-lg p-6 border border-slate-200">
        <div class="rounded-md bg-red-50 border border-red-200 p-3 text-sm text-red-800 mb-4">
          Lenken er ugyldig eller ufullstendig. Be om en ny tilbakestillingslenke.
        </div>
        <a
          routerLink="/forgot-password"
          class="block text-center text-sm font-medium text-blue-600 hover:text-blue-700"
        >
          Be om ny lenke
        </a>
      </div>
    } @else {
      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="bg-white shadow-sm rounded-lg p-6 space-y-4 border border-slate-200"
      >
        @if (errorMessage()) {
          <div class="rounded-md bg-red-50 border border-red-200 p-3 text-sm text-red-800">
            {{ errorMessage() }}
          </div>
        }

        <div>
          <label for="newPassword" class="block text-sm font-medium text-slate-700 mb-1">
            Nytt passord <span class="text-slate-500 font-normal">(minst 8 tegn, ett tall, en liten bokstav)</span>
          </label>
          <input
            id="newPassword"
            type="password"
            formControlName="newPassword"
            autocomplete="new-password"
            class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">
            Bekreft passord
          </label>
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          />
        </div>

        <button
          type="submit"
          [disabled]="submitting()"
          class="w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 disabled:opacity-60"
        >
          @if (submitting()) {
            Lagrer ...
          } @else {
            Sett nytt passord
          }
        </button>
      </form>
    }
  </div>
</div>
