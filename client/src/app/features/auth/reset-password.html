<div class="auth-page">
  <div class="auth-card">
    <div class="auth-hero">
      <h1 class="auth-title">Sett nytt passord.</h1>
      <p class="auth-sub">Velg et nytt, sterkt passord for kontoen din.</p>
    </div>

    @if (missingParams()) {
      <div class="auth-error">
        Lenken er ugyldig eller ufullstendig. Be om en ny tilbakestillingslenke.
      </div>
      <div class="auth-links" style="justify-content: center; margin-top: 16px">
        <a routerLink="/forgot-password">Be om ny lenke</a>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        @if (errorMessage()) {
          <div class="auth-error">{{ errorMessage() }}</div>
        }

        <ui-field label="Nytt passord" hint="Minst 8 tegn, ett tall, en liten bokstav.">
          <input class="ui-control" type="password" formControlName="newPassword" autocomplete="new-password" />
        </ui-field>

        <ui-field label="Bekreft passord">
          <input class="ui-control" type="password" formControlName="confirmPassword" autocomplete="new-password" />
        </ui-field>

        <button ui-button variant="primary" size="lg" type="submit" [disabled]="submitting()" [full]="true">
          @if (submitting()) {
            Lagrer …
          } @else {
            Sett nytt passord
          }
        </button>
      </form>
    }
  </div>
</div>
