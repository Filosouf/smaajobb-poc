<div class="auth-page">
  <div class="auth-card">
    <div class="auth-hero">
      <h1 class="auth-title">Bli med på Smaajobb.</h1>
      <p class="auth-sub">Få ditt første oppdrag — eller publiser ditt eget.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      @if (errorMessage()) {
        <div class="auth-error">{{ errorMessage() }}</div>
      }

      <ui-field label="Fullt navn">
        <input class="ui-control" type="text" formControlName="fullName" autocomplete="name" />
      </ui-field>

      <ui-field label="E-post">
        <input class="ui-control" type="email" formControlName="email" autocomplete="email" placeholder="navn@example.com" />
      </ui-field>

      <ui-field label="Passord" hint="Minst 8 tegn, ett tall, en liten bokstav.">
        <input class="ui-control" type="password" formControlName="password" autocomplete="new-password" />
      </ui-field>

      <ui-field label="Fødselsdato">
        <input class="ui-control" type="date" formControlName="birthDate" />
      </ui-field>

      <ui-field label="Telefon" [optional]="true">
        <input class="ui-control" type="tel" formControlName="phoneNumber" autocomplete="tel" />
      </ui-field>

      <ui-field label="Postnummer" [optional]="true">
        <input class="ui-control" type="text" formControlName="postalCode" autocomplete="postal-code" maxlength="4" placeholder="5000" />
      </ui-field>

      <button ui-button variant="primary" size="lg" type="submit" [disabled]="submitting()" [full]="true">
        @if (submitting()) {
          Oppretter konto …
        } @else {
          Opprett konto
        }
      </button>

      <div class="auth-links">
        <span style="color: var(--color-ink-mid)">Har du konto?</span>
        <a routerLink="/login">Logg inn</a>
      </div>
    </form>
  </div>
</div>
