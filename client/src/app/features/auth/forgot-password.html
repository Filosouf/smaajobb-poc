<div class="auth-page">
  <div class="auth-card">
    <div class="auth-hero">
      <h1 class="auth-title">Tilbakestill passord.</h1>
      <p class="auth-sub">Vi sender en lenke til e-posten din.</p>
    </div>

    @if (sent()) {
      <div class="auth-success">
        Hvis kontoen finnes, har vi sendt en lenke til e-postadressen.
      </div>
      <p class="auth-info">
        I lokalt utviklingsmiljø fanges e-post i smtp4dev på
        <a href="http://localhost:3001" target="_blank">localhost:3001</a>.
      </p>
      <a routerLink="/login" class="auth-links" style="justify-content: center">
        <span>Tilbake til innlogging</span>
      </a>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <ui-field label="E-post">
          <input class="ui-control" type="email" formControlName="email" autocomplete="email" placeholder="navn@example.com" />
        </ui-field>

        <button ui-button variant="primary" size="lg" type="submit" [disabled]="submitting()" [full]="true">
          @if (submitting()) {
            Sender …
          } @else {
            Send tilbakestillingslenke
          }
        </button>

        <div class="auth-links" style="justify-content: center">
          <a routerLink="/login">Tilbake til innlogging</a>
        </div>
      </form>
    }
  </div>
</div>
